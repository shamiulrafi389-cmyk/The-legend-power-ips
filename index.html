                linear-gradient(to bottom, rgba(255,255,255,0.02) 1px, transparent 1px);

            50% { background-position: 100% 50%; }

        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #1F1F1F; border-radius: 10px; }

                                <div className={`text-[8px] font-black px-2.5 py-1 rounded-full uppercase tracking-[0.2em] border ${
                                    product.stockStatus === 'In Stock' ? 'bg-green-500/10 text-green-400 border-green-500/20' :
                                    product.stockStatus === 'Low Stock' ? 'bg-amber-500/10 text-amber-400 border-amber-500/20' :
                                    'bg-red-500/10 text-red-400 border-red-500/20'
                                }`}>
                                    {product.stockStatus}
                                </div>
                            </div>
                            
                            <h2 className="text-4xl font-black mb-2 tracking-tight text-white">{product.name}</h2>
                            <div className="text-2xl font-mono font-black text-white mb-8 tracking-tighter">
                                {product.va}VA <span className="text-[#F27D26]/60 mx-1">/</span> {product.watts}W Rated Power
                            </div>

                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-x-8 gap-y-6 mb-10 w-full pr-2 overflow-y-auto max-h-[40vh] md:max-h-full">
                                {Object.entries(product.specs).map(([key, value]) => (
                                    <div key={key} className="flex items-center gap-4 group">
                                        <div className="w-10 h-10 rounded-xl bg-white/5 border border-white/10 flex items-center justify-center text-slate-400 group-hover:text-[#F27D26] transition-colors">
                                            <Icon name="activity" size={18} />
                                        </div>
                                        <div>
                                            <div className="text-[8px] font-black text-slate-600 uppercase tracking-[0.2em]">{key.replace(/([A-Z])/g, ' $1').replace(/^./, (str) => str.toUpperCase())}</div>
                                            <div className="text-sm font-bold text-white tracking-tight">{value}</div>
                                        </div>
                                    </div>
                                ))}
                            </div>

                            <div className="mb-10 p-6 rounded-3xl bg-white/[0.02] border border-white/5 flex items-center gap-6 w-full group hover:border-[#F27D26]/30 transition-all duration-500">
                                <div className="w-14 h-14 rounded-2xl bg-[#F27D26] text-black flex items-center justify-center shrink-0 shadow-[0_0_20px_rgba(242,125,38,0.2)]">
                                    <Icon name="shield" size={28} />
                                </div>
                                <div>
                                    <div className="text-[8px] font-black text-[#F27D26] mb-1 uppercase tracking-widest">Protection Protocol</div>
                                    <div className="text-xl font-black text-white tracking-tight">2 Year Standard Warranty</div>
                                    <div className="text-[9px] uppercase font-bold tracking-widest text-slate-600 mt-1">Certified Legend Support</div>
                                </div>
                            </div>

                            <div className="flex items-center justify-between w-full mt-auto pt-8 border-t border-white/5">
                                <div>
                                    <div className="text-[8px] font-black text-slate-700 mb-1 uppercase tracking-widest">MSRP Price</div>
                                    <div className="text-4xl font-black text-white glow-text">৳{product.price.toLocaleString()}</div>
                                </div>
                                <button 
                                    onClick={() => { onAdd(product); onClose(); }}
                                    disabled={product.stockStatus === 'Out of Stock'}
                                    className={`bg-white text-black font-black px-10 py-4 rounded-full hover:bg-[#F27D26] transition-all flex items-center gap-3 ${product.stockStatus === 'Out of Stock' ? 'opacity-50 grayscale cursor-not-allowed pointer-events-none' : ''}`}
                                >
                                    {product.stockStatus === 'Out of Stock' ? 'Unavailable' : 'Acquire Unit'} <Icon name="shopping-cart" size={18} />
                                </button>
                            </div>
                        </div>
                    </motion.div>
                </motion.div>
            );
        }

        function App() {
            const [cart, setCart] = useState([]);
            const [isCartOpen, setIsCartOpen] = useState(false);
            const [selectedProduct, setSelectedProduct] = useState(null);
            const [searchQuery, setSearchQuery] = useState("");

            const addToCart = (product) => {
                setCart(prev => {
                    const existing = prev.find(item => item.id === product.id);
                    if (existing) return prev.map(item => item.id === product.id ? {...item, quantity: item.quantity + 1} : item);
                    return [...prev, {...product, quantity: 1}];
                });
                setIsCartOpen(true);
            };

            const removeFromCart = (productId) => {
                setCart(prev => prev.filter(item => item.id !== productId));
            };

            const updateQuantity = (productId, delta) => {
                setCart(prev => prev.map(item => {
                    if (item.id === productId) {
                        const newQty = Math.max(1, item.quantity + delta);
                        return { ...item, quantity: newQty };
                    }
                    return item;
                }));
            };

            const filteredProducts = PRODUCTS.filter(p => p.name.toLowerCase().includes(searchQuery.toLowerCase()));

            return (
                <div className="min-h-screen relative overflow-hidden bg-black">
                    <div className="noise-overlay"></div>
                    <Navbar cartCount={cart.reduce((a, b) => a + b.quantity, 0)} onCartClick={() => setIsCartOpen(true)} searchQuery={searchQuery} onSearchChange={setSearchQuery} />
                    
                    <AnimatePresence>
                        {selectedProduct && (
                            <ProductDetail 
                                product={selectedProduct} 
                                onClose={() => setSelectedProduct(null)} 
                                onAdd={addToCart} 
                            />
                        )}
                    </AnimatePresence>

                    <main>
                        <Hero />
                        <section id="products" className="py-24 px-4 max-w-7xl mx-auto">
                            <div className="flex flex-col md:flex-row justify-between mb-12 border-l border-white/10 pl-8">
                                <h2 className="text-5xl font-black text-white">MODERN ARCHIVE</h2>
                                <p className="text-slate-500 max-w-md mt-4 md:mt-0 font-medium">Precision hardware staged for immediate deployment into high-demand architecture.</p>
                            </div>
                            <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
                                {filteredProducts.map(p => <ProductCard key={p.id} product={p} onAdd={addToCart} onSelect={setSelectedProduct} />)}
                            </div>
                        </section>
                    </main>

                    <AnimatePresence>
                        {isCartOpen && (
                            <motion.div initial={{ opacity: 1 }} exit={{ opacity: 0 }} className="fixed inset-0 z-[100] flex justify-end">
                                <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} onClick={() => setIsCartOpen(false)} className="absolute inset-0 bg-black/80 backdrop-blur-sm" />
                                <motion.div initial={{ x: "100%" }} animate={{ x: 0 }} exit={{ x: "100%" }} transition={{ type: "spring", damping: 25 }} className="w-full max-w-md bg-[#0A0A0A] border-l border-white/10 p-8 relative shadow-2xl flex flex-col">
                                    <div className="flex justify-between items-center mb-8 pb-4 border-b border-white/5">
                                        <h2 className="text-2xl font-black text-white uppercase tracking-tight">System Cart</h2>
                                        <button onClick={() => setIsCartOpen(false)} className="text-slate-500 hover:text-white"><Icon name="x" size={24} /></button>
                                    </div>
                                    <div className="flex-1 overflow-y-auto pr-2">
                                        {cart.length === 0 ? (
                                            <div className="py-20 text-center text-slate-700 font-black text-xs tracking-widest uppercase">Cart Empty</div>
                                        ) : (
                                            cart.map(item => (
                                                <div key={item.id} className="flex gap-4 mb-8 pb-8 border-b border-white/5 last:border-0">
                                                    <div className="w-20 h-20 bg-white/5 rounded-2xl overflow-hidden shrink-0 border border-white/5">
                                                        <ProductImage product={item} className="w-full h-full object-cover" />
                                                    </div>
                                                    <div className="flex-1 min-w-0">
                                                        <div className="flex justify-between items-start mb-2">
                                                            <h3 className="text-white font-black text-base truncate pr-4">{item.name}</h3>
                                                            <button 
                                                                onClick={() => removeFromCart(item.id)}
                                                                className="text-slate-600 hover:text-red-500 transition-colors shrink-0"
                                                            >
                                                                <Icon name="trash-2" size={16} />
                                                            </button>
                                                        </div>
                                                        <div className="text-[10px] text-slate-500 font-bold uppercase tracking-widest mb-4">
                                                            {item.va}VA Rating
                                                        </div>
                                                        <div className="flex items-center justify-between">
                                                            <div className="flex items-center gap-3 bg-white/5 rounded-full p-1 border border-white/10">
                                                                <button 
                                                                    onClick={() => updateQuantity(item.id, -1)}
                                                                    className="w-8 h-8 rounded-full flex items-center justify-center hover:bg-white/10 text-white transition-colors"
                                                                >
                                                                    <Icon name="minus" size={14} />
                                                                </button>
                                                                <span className="text-sm font-mono font-black text-white px-2">{item.quantity}</span>
                                                                <button 
                                                                    onClick={() => updateQuantity(item.id, 1)}
                                                                    className="w-8 h-8 rounded-full flex items-center justify-center hover:bg-white/10 text-white transition-colors"
                                                                >
                                                                    <Icon name="plus" size={14} />
                                                                </button>
                                                            </div>
                                                            <div className="text-[#F27D26] font-mono font-black text-lg">
                                                                ৳{(item.price * item.quantity).toLocaleString()}
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            ))
                                        )}
                                    </div>
                                    <div className="mt-8 pt-8 border-t border-white/10">
                                        <div className="flex justify-between items-end mb-8">
                                            <div className="text-[8px] font-black text-slate-600 uppercase tracking-widest">Total Value</div>
                                            <div className="text-4xl font-black text-white">৳{cart.reduce((a, b) => a + (b.price * b.quantity), 0).toLocaleString()}</div>
                                        </div>
                                        <button className="w-full bg-white text-black font-black py-5 rounded-full hover:bg-[#F27D26] transition-all uppercase tracking-widest text-xs">Execute Procurement</button>
                                    </div>
                                </motion.div>
                            </motion.div>
                        )}
                    </AnimatePresence>

                    <footer className="py-32 px-4 border-t border-white/5 bg-[#050505]">
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between gap-12">
                            <div>
                                <div className="text-2xl font-black mb-6">THE LEGEND <span className="text-[#F27D26]">POWER</span></div>
                                <p className="text-slate-600 max-w-sm mb-8">Premium uninterruptible hardware for precision infrastructure.</p>
                                <div className="inline-flex items-center gap-4 p-4 rounded-3xl bg-white/5 border border-white/10">
                                    <div className="w-10 h-10 bg-[#F27D26] rounded-2xl flex items-center justify-center text-black"><Icon name="shield" /></div>
                                    <div>
                                        <div className="text-[8px] font-black text-slate-700 uppercase tracking-widest">Support</div>
                                        <div className="text-xs font-bold text-white uppercase">2 Year Warranty Standard</div>
                                    </div>
                                </div>
                            </div>
                            <div className="grid grid-cols-2 gap-16">
                                <div>
                                    <h4 className="text-[8px] font-black text-slate-500 uppercase tracking-[0.4em] mb-8">Navigation</h4>
                                    <ul className="space-y-4">
                                        <li><a href="#" className="text-xs font-bold text-slate-500 hover:text-white transition-all uppercase">Inventory</a></li>
                                        <li><a href="#" className="text-xs font-bold text-slate-500 hover:text-white transition-all uppercase">Architecture</a></li>
                                    </ul>
                                </div>
                                <div className="text-right">
                                    <h4 className="text-[8px] font-black text-white/40 uppercase tracking-[0.4em] mb-8">Base of Operations</h4>
                                    
                                    <motion.div 
                                        animate={{ 
                                            y: [0, -5, 0],
                                        }}
                                        transition={{ 
                                            duration: 4, 
                                            repeat: Infinity, 
                                            ease: "easeInOut" 
                                        }}
                                        className="mb-8"
                                    >
                                        <div className="text-[10px] font-black text-[#F27D26] mb-2 uppercase tracking-widest opacity-80">Feni Headquarters</div>
                                        <div className="text-sm font-black tracking-tight leading-tight">
                                            <span className="bg-gradient-to-r from-white via-[#F27D26] to-[#FFB27A] bg-[length:200%_auto] animate-gradient-text bg-clip-text text-transparent">
                                                Circuit House Road,<br />
                                                Mohipal, Feni.
                                            </span>
                                        </div>
                                    </motion.div>

                                    <div className="flex flex-col items-end gap-6">
                                        <a href="tel:+8801619288205" className="inline-flex items-center gap-2 text-xs font-black text-white uppercase group">
                                            <span className="w-8 h-8 rounded-full bg-white/5 border border-white/10 flex items-center justify-center group-hover:bg-[#F27D26] group-hover:text-black transition-all">
                                                <Icon name="phone" size={12} />
                                            </span>
                                            +8801619-288205
                                        </a>
                                        <a href="https://www.facebook.com/share/1CMc8a93N2/?mibextid=wwXIfr" target="_blank" className="w-10 h-10 rounded-full bg-white/5 border border-white/10 flex items-center justify-center text-slate-500 hover:text-white hover:border-[#F27D26]/50 transition-all shadow-[0_0_15px_rgba(242,125,38,0.1)]">
                                            <Icon name="facebook" size={18} />
                                        </a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
