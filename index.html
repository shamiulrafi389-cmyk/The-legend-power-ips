<!DOCTYPE html>
<html lang="en">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Tailwind CSS CDN (v4 style with Play CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel for JSX -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <!-- Lucide Icons -->

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root {
            --color-brand: #F27D26;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #000;
            color: #fff;
            margin: 0;
            overflow-x: hidden;
        }

        .font-mono { font-family: 'JetBrains Mono', monospace; }

        .glass-panel {
            background-color: rgba(10, 10, 10, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .industrial-card {
            background-color: #0A0A0A;
            border: 1px solid #1F1F1F;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .industrial-card:hover {
            border-color: rgba(242, 125, 38, 0.5);
            transform: translateY(-8px);
            box-shadow: 0 20px 40px -20px rgba(0,0,0,0.8), 0 0 20px rgba(242,125,38,0.05);
        }

        .noise-overlay {
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            position: absolute;
            inset: 0;
            opacity: 0.03;
            pointer-events: none;
        }

        .grid-pattern {
            background-image: 
                linear-gradient(to right, rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 64px 64px;
        }

        .glow-text {
            text-shadow: 0 0 20px rgba(242, 125, 38, 0.4);
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #1F1F1F; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #2A2A2A; }
    </style>
</head>
<body>
    <div id="root"></div>

                stockStatus: "In Stock",
                stockQuantity: 12,

                    efficiency: "> 98%",

                }

        function Navbar({ cartCount, onCartClick, searchQuery, onSearchChange }) {
            return (
                <nav className="fixed top-0 left-0 right-0 z-50 p-6 pointer-events-none">
                    <div className="max-w-7xl mx-auto glass-panel h-16 rounded-full px-8 flex items-center justify-between pointer-events-auto border-white/5 relative overflow-hidden backdrop-blur-2xl transition-all">
                        <div className="noise-overlay"></div>
                        <div className="flex items-center gap-6 shrink-0 relative z-10">

                                <Icon name="zap" className="text-black fill-current" size={20} />
                            </motion.div>
                            <div className="font-black tracking-[-0.05em] text-lg text-white leading-none">

                                    className="w-full bg-white/20 border border-white/20 rounded-full py-2.5 pl-12 pr-6 text-sm font-bold focus:outline-none focus:border-[#F27D26] focus:bg-white/30 transition-all placeholder:text-slate-500 text-white shadow-inner"
                                />
                            </div>
                            
                            <motion.button whileHover={{ scale: 1.1 }} whileTap={{ scale: 0.95 }} onClick={onCartClick} className="group relative p-3 text-slate-400 hover:text-white transition-colors shrink-0 bg-white/5 rounded-full border border-white/10">
                                <Icon name="shopping-cart" size={20} />

                                    <span className="absolute -top-1 -right-1 bg-[#F27D26] text-black text-[9px] font-black w-5 h-5 rounded-full flex items-center justify-center border-2 border-black">

        }

        function Hero() {
            return (
                <section className="relative pt-44 pb-32 px-4 overflow-hidden grid-pattern">
                    <div className="max-w-7xl mx-auto flex flex-col items-center text-center">
                        <motion.div initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} className="inline-flex items-center gap-3 bg-white/5 backdrop-blur-md border border-white/10 px-4 py-1.5 rounded-full mb-10">
                            <span className="w-1.5 h-1.5 bg-[#F27D26] rounded-full animate-pulse shadow-[0_0_8px_#F27D26]"></span>
                            <span className="text-[8px] font-black tracking-widest text-white/80 uppercase">Legend Performance Certified</span>
                        </motion.div>
                        <h1 className="text-7xl md:text-[110px] font-black tracking-[-0.05em] mb-10 leading-[0.8] text-white">
                            THE LEGEND <br />
                            <span className="bg-clip-text text-transparent bg-gradient-to-b from-[#F27D26] to-[#FF8E3C] brightness-110 drop-shadow-[0_0_20px_rgba(242,125,38,0.4)]">POWER</span> <br />
                            <span className="text-slate-900 drop-shadow-[0_0_1px_rgba(255,255,255,0.1)]">IPS & UPS.</span>
                        </h1>
                        <p className="text-xl text-slate-400 mb-12 max-w-2xl leading-relaxed font-medium">
                            Engineered for those who demand uninterruptible excellence. <span className="text-white">Pure Sine Wave</span> architecture delivering architectural precision in power management.
                        </p>
                        <motion.a whileHover={{ scale: 1.05 }} href="#products" className="bg-white text-black font-black px-12 py-5 rounded-full hover:bg-[#F27D26] transition-all flex items-center gap-4">
                            System Inventory <Icon name="arrow-right" size={20} />
                        </motion.a>
                    </div>
                </section>
            );
        }

        function ProductCard({ product, onAdd, onSelect }) {
            return (
                <motion.div 
                    initial={{ opacity: 0, y: 20 }}
                    whileInView={{ opacity: 1, y: 0 }}
                    viewport={{ once: true }}
                    className="industrial-card group flex flex-col h-full rounded-[2.5rem] relative overflow-hidden cursor-pointer"
                    onClick={() => onSelect(product)}
                >
                    <div className="relative aspect-[5/4] overflow-hidden bg-[#111] border-b border-white/5">
                        <img src={product.img} className="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-110" />
                        <div className="absolute top-5 left-5 z-20">
                            <div className="bg-white/10 backdrop-blur-md text-white text-[8px] font-black px-3 py-1 rounded-full uppercase tracking-[0.2em] shadow-2xl border border-white/10">
                                Series V.04
                            </div>
                        </div>
                        <div className="absolute top-5 right-5 z-20">
                            <div className={`text-[8px] font-black px-3 py-1 rounded-full uppercase tracking-[0.2em] shadow-2xl backdrop-blur-md border ${
                                product.stockStatus === 'In Stock' ? 'bg-green-500/10 text-green-400 border-green-500/20' :
                                product.stockStatus === 'Low Stock' ? 'bg-amber-500/10 text-amber-400 border-amber-500/20' :
                                'bg-red-500/10 text-red-400 border-red-500/20'
                            }`}>
                                {product.stockStatus}
                            </div>

                        <div className="flex justify-between items-start mb-6">

                                <div className="text-[8px] font-black tracking-[0.4em] text-slate-700 uppercase mb-2">The Legend Power™</div>
                                <h3 className="text-2xl font-black transition-colors text-white">{product.name}</h3>
                            </div>

                                <Icon name="zap" size={18} />
                            </div>
                        </div>

                        <div className="grid grid-cols-2 gap-px bg-white/5 p-px rounded-2xl overflow-hidden mb-8">
                            <div className="bg-black/60 p-5">
                                <div className="text-[8px] font-black tracking-widest text-slate-700 uppercase mb-2">Rating</div>
                                <div className="text-2xl font-mono font-black text-white">{product.va}<span className="text-[10px] text-slate-600 ml-1 uppercase">va</span></div>
                            </div>
                            <div className="bg-black/60 p-5">
                                <div className="text-[8px] font-black tracking-widest text-slate-700 uppercase mb-2">Output</div>
                                <div className="text-2xl font-mono font-black text-white">{product.watts}<span className="text-[10px] text-slate-600 ml-1 uppercase">w</span></div>
                            </div>
                        </div>

                        <div className="mt-auto pt-6 flex items-center justify-between border-t border-white/5">
                            <div>
                                <div className="text-[8px] font-black tracking-widest text-slate-700 uppercase mb-1">Unit Price</div>
                                <div className="text-3xl font-black text-white tracking-tighter">৳{product.price.toLocaleString()}</div>
                            </div>
                            <button 
                                onClick={(e) => { e.stopPropagation(); onAdd(product); }}
                                className="w-12 h-12 bg-white rounded-2xl flex items-center justify-center text-black hover:bg-[#F27D26] transition-all"

                                <Icon name="plus" size={20} />
                            </button>
                        </div>
                    </div>
                </motion.div>
            );

        function ProductDetail({ product, onClose, onAdd }) {
            if (!product) return null;
            return (
                <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} className="fixed inset-0 z-[200] flex items-center justify-center p-4">
                    <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} onClick={onClose} className="absolute inset-0 bg-black/90 backdrop-blur-md" />
                    <motion.div 
                        initial={{ opacity: 0, scale: 0.9, y: 20 }} 
                        animate={{ opacity: 1, scale: 1, y: 0 }} 
                        exit={{ opacity: 0, scale: 0.9, y: 20 }} 
                        className="glass-panel w-full max-w-4xl max-h-[90vh] overflow-y-auto md:overflow-hidden rounded-[2.5rem] relative z-10 flex flex-col md:flex-row shadow-[0_0_100px_rgba(0,0,0,0.8)] border-white/10"
                    >
                        <div className="noise-overlay"></div>
                        <div className="w-full md:w-1/2 aspect-square md:aspect-auto bg-[#111] sticky top-0 md:h-[90vh] z-20 overflow-hidden">
                            <img src={product.img} className="w-full h-full object-cover opacity-80" />
                            <div className="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent opacity-60"></div>
                        </div>
                        <div className="w-full md:w-1/2 p-10 flex flex-col items-start bg-black/40">
                            <button onClick={onClose} className="absolute top-8 right-8 text-slate-500 hover:text-white transition-colors z-30">
                                <Icon name="x" size={24} />
                            </button>
                            
                            <div className="flex items-center gap-4 mb-4">
                                <div className="text-[8px] font-black tracking-[0.4em] text-[#F27D26] uppercase">Hardware Specifications</div>
                                <div className={`text-[8px] font-black px-2.5 py-1 rounded-full uppercase tracking-[0.2em] border ${
                                    product.stockStatus === 'In Stock' ? 'bg-green-500/10 text-green-400 border-green-500/20' :
                                    product.stockStatus === 'Low Stock' ? 'bg-amber-500/10 text-amber-400 border-amber-500/20' :
                                    'bg-red-500/10 text-red-400 border-red-500/20'
                                }`}>
                                    {product.stockStatus}
                                </div>
                            </div>
                            
                            <h2 className="text-4xl font-black mb-2 tracking-tight text-white">{product.name}</h2>
                            <div className="text-2xl font-mono font-black text-slate-500 mb-8 tracking-tighter">
                                {product.va}VA / {product.watts}W
                            </div>

                            <div className="grid grid-cols-1 gap-6 mb-8 w-full">
                                {Object.entries(product.specs).map(([key, value]) => (
                                    <div key={key} className="flex items-center gap-4 group">
                                        <div className="w-10 h-10 rounded-xl bg-white/5 border border-white/10 flex items-center justify-center text-slate-400 group-hover:text-[#F27D26] transition-colors">
                                            <Icon name="activity" size={18} />
                                        </div>
                                        <div>
                                            <div className="text-[8px] font-black text-slate-600 uppercase tracking-widest">{key.replace(/([A-Z])/g, ' $1')}</div>
                                            <div className="text-sm font-bold text-white tracking-tight">{value}</div>
                                        </div>
                                    </div>

                                    <Icon name="shield" size={28} />
                                </div>
                                <div>
                                    <div className="text-[8px] font-black text-[#F27D26] mb-1 uppercase tracking-widest">Protection Protocol</div>
                                    <div className="text-xl font-black text-white tracking-tight">2 Year Standard Warranty</div>
                                    <div className="text-[9px] uppercase font-bold tracking-widest text-slate-600 mt-1">Certified Legend Support</div>
                                </div>
                            </div>

                            <div className="flex items-center justify-between w-full mt-auto pt-8 border-t border-white/5">
                                <div>
                                    <div className="text-[8px] font-black text-slate-700 mb-1 uppercase tracking-widest">MSRP Price</div>
                                    <div className="text-4xl font-black text-white glow-text">৳{product.price.toLocaleString()}</div>

                                    onClick={() => { onAdd(product); onClose(); }}
                                    disabled={product.stockStatus === 'Out of Stock'}
                                    className={`bg-white text-black font-black px-10 py-4 rounded-full hover:bg-[#F27D26] transition-all flex items-center gap-3 ${product.stockStatus === 'Out of Stock' ? 'opacity-50 grayscale cursor-not-allowed pointer-events-none' : ''}`}
                                >
                                    {product.stockStatus === 'Out of Stock' ? 'Unavailable' : 'Acquire Unit'} <Icon name="shopping-cart" size={18} />
                                </button>
                            </div>
                        </div>
                    </motion.div>
                </motion.div>
            );
        }

        function App() {
            const [cart, setCart] = useState([]);
            const [isCartOpen, setIsCartOpen] = useState(false);
            const [selectedProduct, setSelectedProduct] = useState(null);
            const [searchQuery, setSearchQuery] = useState("");

            const addToCart = (product) => {
                setCart(prev => {
                    const existing = prev.find(item => item.id === product.id);
                    if (existing) return prev.map(item => item.id === product.id ? {...item, quantity: item.quantity + 1} : item);
                    return [...prev, {...product, quantity: 1}];
                });
            };

            const filteredProducts = PRODUCTS.filter(p => p.name.toLowerCase().includes(searchQuery.toLowerCase()));

            return (
                <div className="min-h-screen relative overflow-hidden bg-black">
                    <div className="noise-overlay"></div>
                    <Navbar cartCount={cart.reduce((a, b) => a + b.quantity, 0)} onCartClick={() => setIsCartOpen(true)} searchQuery={searchQuery} onSearchChange={setSearchQuery} />
                    
                    <AnimatePresence>
                        {selectedProduct && (
                            <ProductDetail 
                                product={selectedProduct} 
                                onClose={() => setSelectedProduct(null)} 
                                onAdd={addToCart} 
                            />
                        )}
                    </AnimatePresence>

                    <main>
                        <Hero />
                        <section id="products" className="py-24 px-4 max-w-7xl mx-auto">
                            <div className="flex flex-col md:flex-row justify-between mb-12 border-l border-white/10 pl-8">
                                <h2 className="text-5xl font-black text-white">MODERN ARCHIVE</h2>
                                <p className="text-slate-500 max-w-md mt-4 md:mt-0 font-medium">Precision hardware staged for immediate deployment into high-demand architecture.</p>
                            </div>
                            <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
                                {filteredProducts.map(p => <ProductCard key={p.id} product={p} onAdd={addToCart} onSelect={setSelectedProduct} />)}
                            </div>
                        </section>
                    </main>

                    <AnimatePresence>
                        {isCartOpen && (
                            <motion.div initial={{ opacity: 1 }} exit={{ opacity: 0 }} className="fixed inset-0 z-[100] flex justify-end">
                                <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} onClick={() => setIsCartOpen(false)} className="absolute inset-0 bg-black/80 backdrop-blur-sm" />
                                <motion.div initial={{ x: "100%" }} animate={{ x: 0 }} exit={{ x: "100%" }} transition={{ type: "spring", damping: 25 }} className="w-full max-w-md bg-[#0A0A0A] border-l border-white/10 p-8 relative shadow-2xl flex flex-col">
                                    <div className="flex justify-between items-center mb-8 pb-4 border-b border-white/5">
                                        <h2 className="text-2xl font-black text-white uppercase tracking-tight">System Cart</h2>
                                        <button onClick={() => setIsCartOpen(false)} className="text-slate-500 hover:text-white"><Icon name="x" size={24} /></button>
                                    </div>
                                    <div className="flex-1 overflow-y-auto">
                                        {cart.length === 0 ? <div className="py-20 text-center text-slate-700 font-black text-xs tracking-widest uppercase">Cart Empty</div> : cart.map(item => (
